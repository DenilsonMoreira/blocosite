services:
  admin:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: development
    command: pnpm --filter @blocosite/admin dev
    environment:
      NODE_ENV: development
    ports:
      - "${ADMIN_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: development
    command: pnpm --filter @blocosite/api dev
    environment:
      NODE_ENV: development
      API_HOST: 0.0.0.0
      API_PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-blocosite}:${POSTGRES_PASSWORD:-change-me-local}@postgres:5432/${POSTGRES_DB:-blocosite}
      APP_BASE_URL: http://localhost:${ADMIN_PORT:-3000}
      SESSION_PEPPER: ${SESSION_PEPPER:-replace-with-at-least-32-random-bytes}
      TOKEN_PEPPER: ${TOKEN_PEPPER:-replace-with-at-least-32-random-bytes}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@blocosite.local}
    ports:
      - "${API_HOST_PORT:-3333}:3333"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3333/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  sites:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: development
    command: pnpm --filter @blocosite/sites dev
    environment:
      NODE_ENV: development
    ports:
      - "${SITES_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy

  validate:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: validation
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://blocosite:change-me-local@postgres:5432/blocosite
      SESSION_PEPPER: test-session-pepper-with-32-characters
      TOKEN_PEPPER: test-token-pepper-with-at-least-32-chars

  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: development
    command: pnpm db:migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blocosite}:${POSTGRES_PASSWORD:-change-me-local}@postgres:5432/${POSTGRES_DB:-blocosite}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blocosite}
      POSTGRES_USER: ${POSTGRES_USER:-blocosite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-blocosite}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres18_data:
  minio_data:
